    <style>
        :root {
            --neon: #ff0055;
            --neon-blue: #00f3ff;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* 1. HUD (Top Bar) */
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 100;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--glass);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .status-light {
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            box-shadow: 0 0 5px #333;
            transition: all 0.3s;
        }

        .status-light.active {
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
        }

        .status-text {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
            font-weight: bold;
        }

        .brand-text {
            font-size: 0.8rem;
            letter-spacing: 3px;
            opacity: 0.5;
        }

        /* 2. WORLD LAYER (Visualizer - The Hero) */
        .orb-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80%;
            /* Takes up top 80% */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        canvas {
            border-radius: 50%;
        }

        /* 3. CHAT OVERLAY (Bottom, Non-Intrusive) */
        .chat-container {
            position: absolute;
            bottom: 120px;
            /* Above controls */
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 90%;
            height: 200px;
            overflow-y: hidden;
            /* Auto scroll handles it, but hide bar */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            /* Text fills from bottom */
            gap: 10px;
            mask-image: linear-gradient(to bottom, transparent, black 20%);
            z-index: 50;
            pointer-events: none;
            /* Let clicks pass through to orb if needed */
        }

        .chat-msg {
            padding: 10px 20px;
            border-radius: 15px;
            color: #eee;
            font-size: 1rem;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            /* Very subtle backing */
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-self: center;
            /* Center text */
            text-align: center;
        }

        .chat-msg.user {
            color: var(--neon-blue);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .chat-msg.ai {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .timestamp {
            display: none;
        }

        /* Clean look, hide timestamp */

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 4. CONTROLS (Bottom Bar) */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(20, 20, 20, 0.6);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        button {
            background: transparent;
            border: none;
            color: var(--neon);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        button:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--neon);
            background: rgba(255, 255, 255, 0.05);
        }

        button:disabled {
            color: #444;
            cursor: not-allowed;
            text-shadow: none;
        }

        /* MIC BUTTON - THE HERO ACTION */
        button#micBtn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            background: rgba(255, 0, 85, 0.1);
            color: transparent;
            /* Text hidden, use icon or color */
            position: relative;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mic Icon using CSS */
        button#micBtn::after {
            content: '';
            width: 20px;
            height: 30px;
            background: var(--neon);
            border-radius: 10px;
            position: absolute;
            box-shadow: 0 0 10px var(--neon);
            transition: all 0.3s;
        }

        button#micBtn.recording {
            background: var(--neon);
            box-shadow: 0 0 40px var(--neon);
            border-color: #fff;
            animation: pulse 1.5s infinite;
        }

        button#micBtn.recording::after {
            background: #fff;
            box-shadow: none;
            height: 20px;
            /* Square for stop */
            width: 20px;
            border-radius: 2px;
        }

        select {
            background: transparent;
            color: #aaa;
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            text-transform: uppercase;
            text-align: right;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        #log {
            display: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hud {
                padding: 15px;
            }

            .brand-text {
                display: none;
            }

            .orb-container {
                height: 60%;
                top: 0;
            }

            .chat-container {
                bottom: 140px;
                width: 95%;
            }

            .controls {
                width: 90%;
                justify-content: space-between;
                padding: 10px 15px;
            }

            button#micBtn {
                width: 50px;
                height: 50px;
            }
        }
    </style>

        async function connect() {

            const status = document.getElementById("statusText");
            const light = document.getElementById("connStatus");
            const voice = document.getElementById("voiceSelect").value;

            status.innerText = "INITIALIZING...";

            // Init Audio & SFX

            setTimeout(() => playTone(1200, "sine"), 100);

        function disconnect() {

            stopMic(); // Ensure mic is off
            resetUI();

                socket.close();

        function resetUI() {

            document.getElementById("connectBtn").disabled = false;
            document.getElementById("micBtn").disabled = true;
            document.getElementById("statusText").innerText = "SYSTEM OFFLINE";

            document.getElementById("connStatus").classList.remove("active");
            document.getElementById("micStatus").innerText = "[MIC: OFF]";
            document.getElementById("micStatus").style.color = "#555";
        }

        // --- 2. AUDIO PLAYBACK ENGINE ---
        function playAudio(base64String) {
            const binaryString = atob(base64String);
            const len = binaryString.length;
            const bytes = new Int16Array(len / 2);
            for (let i = 0; i < len; i += 2) {
                bytes[i / 2] = (binaryString.charCodeAt(i) & 0xff) | ((binaryString.charCodeAt(i + 1) & 0xff) << 8);
            }

            const float32Data = new Float32Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) float32Data[i] = bytes[i] / 32768;

            // Create buffer at system sample rate
            const buffer = audioCtx.createBuffer(1, float32Data.length, 24000);
            buffer.getChannelData(0).set(float32Data);

            // NOTE: Web Audio API automatically resamples if buffer rate (24k) != context rate
            // But just in case, we log it.
            console.log("Buffer Rate: 24000, Context Rate: " + audioCtx.sampleRate);

            console.log("Playing Audio Chunk:", {
                state: audioCtx.state,
                currentTime: audioCtx.currentTime,
                duration: buffer.duration,
                sampleRate: buffer.sampleRate,
                length: buffer.length
            });

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;

            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 1.2;

            source.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            // double check destination
            if (audioCtx.destination.maxChannelCount === 0) {
                console.error("Audio Destination has 0 channels!");
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => console.log("Audio Resumed!"));
            }

            const playTime = Math.max(audioCtx.currentTime, nextStartTime);
            source.start(playTime);
            nextStartTime = playTime + buffer.duration;

            // Track for interruption
            currentSource = source;
            source.onended = () => {
                if (currentSource === source) currentSource = null;
            };
        }

        function stopAudio() {
            if (currentSource) {
                try { currentSource.stop(); } catch (e) { }
                currentSource = null;
            }
            // Reset timing so new audio starts immediately
            if (audioCtx) nextStartTime = audioCtx.currentTime;
        }

        // --- 3. MIC INPUT & TRANSCRIPTION ---
        let mediaStream = null;
        let audioProcessor = null;

        function toggleMic() {
            if (!isConnected) return;
            if (isRecording) {
                stopMic();
            } else {
                startMic();
            }
        }

        async function startMic() {
            if (!isConnected) return;
            isRecording = true;

            // BARGE-IN: Stop Chaka if she is talking
            stopAudio();

            document.getElementById("micBtn").classList.add("recording");
            document.getElementById("micStatus").innerText = "[MIC: ACTIVE]";
            document.getElementById("micStatus").style.color = "#0f0";

            playTone(800, "sine"); // Start Mic Tone

            try {
                // STUDIO QUALITY AUDIO CONSTRAINTS
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        channelCount: 1
                    }
                });

                const inputCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (inputCtx.state === 'suspended') {
                    await inputCtx.resume();
                }

                await inputCtx.audioWorklet.addModule("mic-worklet.js");
                const workletNode = new AudioWorkletNode(inputCtx, "mic-worklet");
                const source = inputCtx.createMediaStreamSource(mediaStream);

                source.connect(workletNode);

                // CRITICAL: Connect to destination (muted) to keep graph alive in some browsers
                const muteGain = inputCtx.createGain();
                muteGain.gain.value = 0;
                workletNode.connect(muteGain);
                muteGain.connect(inputCtx.destination);

                let inputBuffer = [];
                const TARGET_BUFFER_SIZE = 4096;

                workletNode.port.onmessage = (e) => {
                    if (!isConnected || !isRecording || !socket || socket.readyState !== WebSocket.OPEN) return;

                    const input = e.data;

                    // 1. Accumulate buffer
                    for (let i = 0; i < input.length; i++) {
                        inputBuffer.push(input[i]);
                    }

                    // 2. Process only when we have enough data
                    while (inputBuffer.length >= TARGET_BUFFER_SIZE) {
                        const chunk = new Float32Array(inputBuffer.slice(0, TARGET_BUFFER_SIZE));
                        inputBuffer = inputBuffer.slice(TARGET_BUFFER_SIZE);

                        // --- FAST VOICE DETECTION ---
                        let energy = 0;
                        for (let i = 0; i < chunk.length; i++) energy += chunk[i] * chunk[i];
                        energy /= chunk.length;

                        // Lower threshold significantly to ensure it picks up speech
                        if (energy < 0.00001) continue;

                        // Visual Feedback: Flash TX
                        const status = document.getElementById("micStatus");
                        status.innerText = "[MIC: TX]";
                        status.style.color = "#ff0055"; // Pink/Neon for TX

                        // Reset status after a brief moment (debounce visual)
                        if (!status.dataset.resetTimer) {
                            status.dataset.resetTimer = setTimeout(() => {
                                status.innerText = "[MIC: ACTIVE]";
                                status.style.color = "#0f0";
                                delete status.dataset.resetTimer;
                            }, 100);
                        }

                        // --- DOWNSAMPLE TO 16k ---
                        const downsampled = downsample(chunk, inputCtx.sampleRate, 16000);

                        // --- FLOAT32 -> PCM16 ---
                        const pcmData = new Int16Array(downsampled.length);
                        for (let i = 0; i < downsampled.length; i++) {
                            let s = Math.max(-1, Math.min(1, downsampled[i]));
                            pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }

                        const base64Audio = btoa(
                            String.fromCharCode(...new Uint8Array(pcmData.buffer))
                        );

                        socket.send(JSON.stringify({
                            realtime_input: {
                                media_chunks: [{ mime_type: "audio/pcm", data: base64Audio }]
                            }
                        }));
                    }
                };

                audioProcessor = workletNode;

                // Robust Transcription Start
                if (recognition) {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log("Recog start error:", e);
                    }
                }

            } catch (e) {
                console.error(e);
                stopMic();
                alert("Mic Error: " + e.message);
            }
        }

        function stopMic() {
            isRecording = false;
            const btn = document.getElementById("micBtn");
            btn.classList.remove("recording");

            playTone(400, "sine"); // Stop Mic Tone

            if (recognition) {
                try { recognition.stop(); } catch (e) { }
            }

            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioProcessor) audioProcessor.disconnect();

            document.getElementById("micStatus").innerText = "[MIC: OFF]";
            document.getElementById("micStatus").style.color = "#555";
        }

        function setupRecognition() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = true; // KEEP LISTENING
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        }
                    }
                    if (finalTranscript) {
                        addChat(finalTranscript, "user");
                    }
                };

                // Auto-restart watchdog
                recognition.onend = () => {
                    console.log("Recognition ended. isRecording:", isRecording);
                    if (isRecording) {
                        document.getElementById("micStatus").innerText = "[MIC: RESTARTING...]";
                        document.getElementById("micStatus").style.color = "yellow";
                        try { recognition.start(); } catch (e) { }
                    } else {
                        document.getElementById("micStatus").innerText = "[MIC: OFF]";
                        document.getElementById("micStatus").style.color = "#555";
                    }
                };

                recognition.onerror = (e) => {
                    console.log("Speech Recog Error:", e.error);
                    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                        document.getElementById("micStatus").innerText = "[MIC: BLOCKED]";
                        document.getElementById("micStatus").style.color = "red";
                        alert("Microphone access blocked. Please allow perms.");
                        isRecording = false;
                        stopMic();
                    }
                };
            } else {
                console.log("Web Speech API not supported");
            }
        }

        function playTone(freq, type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- 4. PARTICLE VISUALIZER ---
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 2 + 1;
                this.life = 100;
                this.color = `hsl(${Math.random() * 40 + 330}, 100%, 50%)`; // Pink/Red Hues
            }
            update(amp) {
                this.x += Math.cos(this.angle) * this.speed * amp;
                this.y += Math.sin(this.angle) * this.speed * amp;
                this.life -= 2;
                this.speed *= 0.95;
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 100;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            if (!analyser) return;

            analyser.getByteFrequencyData(dataArray);

            // Calculate Audio Energy
            const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
            const energy = average / 255; // 0 to 1

            const canvas = document.getElementById("visualizer");
            const ctx = canvas.getContext("2d");
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;

            // Clear with trail effect
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.fillRect(0, 0, width, height);

            // Orb Base
            const radius = 50 + (energy * 50);
            const glow = ctx.createRadialGradient(centerX, centerY, radius * 0.5, centerX, centerY, radius * 2);
            glow.addColorStop(0, "rgba(255, 0, 85, 1)");
            glow.addColorStop(1, "rgba(255, 0, 85, 0)");

            ctx.globalAlpha = 1;
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            // Spawn Particles on Beats
            if (energy > 0.4) {
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle(centerX, centerY));
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(energy + 0.5);
                p.draw(ctx);
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Waveform Ring
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            for (let i = 0; i < dataArray.length; i++) {
                const angle = (i / dataArray.length) * Math.PI * 2;
                const r = radius + 20 + (dataArray[i] / 4);
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function addChat(text, sender) {
            const chatLog = document.getElementById("chatLog");
            const msg = document.createElement("div");
            msg.className = `chat-msg ${sender}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            msg.innerHTML = `<span class="timestamp">${time}</span>${text}`;
            chatLog.appendChild(msg);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function log(msg) {
            console.log(msg); // Just log to console now
        }
    </script>
</body>
