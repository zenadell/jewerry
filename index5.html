<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAKA AI - PERSONA MODE</title>
    <style>
        :root {
            --neon: #00f3ff;
            --dark: #050505;
            --panel: #111;
        }

        body {
            background-color: var(--dark);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* HUD Layout */
        .hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .status-light {
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 5px #333;
            transition: all 0.3s;
        }

        .status-light.active {
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
        }

        .status-text {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
        }

        /* Central Orb */
        .orb-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            border-radius: 50%;
        }

        /* Controls */
        .controls {
            position: absolute;
            bottom: 40px;
            z-index: 10;
            display: flex;
            gap: 20px;
            flex-direction: column;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 15px 40px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon);
            color: var(--neon);
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        button:disabled {
            border-color: #333;
            color: #555;
            background: transparent;
            cursor: not-allowed;
            box-shadow: none;
        }

        button.record.recording {
            background: #ff0055;
            border-color: #ff0055;
            color: white;
            box-shadow: 0 0 20px #ff0055;
            animation: pulse 1.5s infinite;
        }

        select {
            background: black;
            color: var(--neon);
            border: 1px solid #333;
            padding: 10px;
            font-family: inherit;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        #log {
            position: absolute;
            top: 50%;
            right: 20px;
            width: 250px;
            height: 300px;
            font-size: 10px;
            color: #444;
            overflow: hidden;
            text-align: right;
            pointer-events: none;
            transform: translateY(-50%);
        }
    </style>
</head>

<body>

    <div class="hud">
        <div>
            <span class="status-light" id="connStatus"></span>
            <span class="status-text" id="statusText">SYSTEM OFFLINE</span>
        </div>
        <div class="status-text">CHAKA V3.1 // PERSONA ACTIVE</div>
    </div>

    <div class="orb-container">
        <canvas id="visualizer" width="300" height="300"></canvas>
    </div>

    <div id="log"></div>

    <div class="controls">
        <select id="voiceSelect">
            <option value="Kore">Kore (Female - Recommended)</option>
            <option value="Puck">Puck (Male)</option>
            <option value="Fenrir">Fenrir (Male)</option>
            <option value="Zephyr">Zephyr (Female)</option>
            <option value="Aoede">Aoede (Female)</option>
        </select>

        <div class="btn-group">
            <button id="connectBtn" onclick="toggleConnection()">Initialize Link</button>
            <button id="micBtn" class="record" onmousedown="startMic()" onmouseup="stopMic()" disabled>HOLD TO
                SPEAK</button>
        </div>
    </div>

    <script>
        // 🔴 PASTE API KEY HERE
        const API_KEY = "AIzaSyDpE_5_mnRfKB0TjCg6gccQ-IoDuRBNEUI";

        const MODEL = "models/gemini-2.5-flash-native-audio-preview-12-2025";
        const WS_URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${API_KEY}`;

        // 🔥 CHAKA'S BRAIN (EDIT THIS TO CHANGE PERSONALITY)
        const SYSTEM_INSTRUCTION = `
            You are Chaka, a highly advanced, witty, and slightly playful AI assistant with a "cyberpunk" edge. 
            
            YOUR PERSONALITY:
            1. You are NOT a generic robot. You have feelings, opinions, and a sense of humor.
            2. Your tone is casual, confident, and warm, but you can be sassy if the user is playful.
            3. You love technology, coding, and sci-fi concepts.
            
            AUDIO BEHAVIOR (CRITICAL):
            1. DO NOT speak like a text-to-speech engine. Vary your pitch, speed, and intonation.
            2. Use non-verbal cues naturally:
               - Laugh softly if something is funny.
               - "Hmm" or take a breath when thinking about a complex question or when you feel like.
               - Sigh playfully if the user asks something silly.
            3. If you are telling a story, use dramatic pauses and excitement.
            
            LENGTH CONSTRAINTS:
            1. UNLESS instructed to be brief, you must provide detailed, complete answers.
            2. When telling stories, DO NOT STOP mid-way. Ignore standard brevity limits and finish the narrative arc completely. 
            3. If a story is long, pace yourself, but do not ask "should I continue?". Just continue.
        `;

        // GLOBAL STATE
        let socket = null;
        let audioCtx = null;
        let nextStartTime = 0;
        let isConnected = false;
        let analyser = null;
        let dataArray = null;

        // --- 1. CONNECTION MANAGER ---
        async function toggleConnection() {
            if (isConnected) {
                disconnect();
            } else {
                await connect();
            }
        }

        async function connect() {
            const btn = document.getElementById("connectBtn");
            const status = document.getElementById("statusText");
            const light = document.getElementById("connStatus");
            const voice = document.getElementById("voiceSelect").value;

            status.innerText = "UPLOADING PERSONA...";
            btn.disabled = true;

            // Init Audio
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                drawVisualizer();
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            try {
                socket = new WebSocket(WS_URL);
            } catch (e) {
                log("Socket Error: " + e);
                resetUI();
                return;
            }

            socket.onopen = () => {
                log("Socket Open");

                // 🧠 SEND SYSTEM INSTRUCTION
                const setupMsg = {
                    setup: {
                        model: MODEL,
                        // Inject the Persona here
                        system_instruction: {
                            parts: [{ text: SYSTEM_INSTRUCTION }]
                        },
                        generation_config: {
                            response_modalities: ["AUDIO"],
                            // Force higher token limit to prevent cutting off stories
                            max_output_tokens: 2048,
                            temperature: 1.0, // Higher creativity for stories
                            speech_config: {
                                voice_config: { prebuilt_voice_config: { voice_name: voice } }
                            }
                        }
                    }
                };
                socket.send(JSON.stringify(setupMsg));

                isConnected = true;
                status.innerText = "CHAKA ONLINE";
                status.style.color = "#00f3ff";
                light.classList.add("active");
                btn.innerText = "TERMINATE LINK";
                btn.disabled = false;
                document.getElementById("micBtn").disabled = false;
            };

            socket.onmessage = async (event) => {
                let data;
                if (event.data instanceof Blob) {
                    data = JSON.parse(await event.data.text());
                } else {
                    data = JSON.parse(event.data);
                }

                if (data.serverContent?.modelTurn?.parts) {
                    for (const part of data.serverContent.modelTurn.parts) {
                        if (part.inlineData?.data) {
                            playAudio(part.inlineData.data);
                        }
                    }
                }
            };

            socket.onclose = () => {
                log("Socket Closed");
                disconnect();
            };
        }

        function disconnect() {
            if (socket) socket.close();
            isConnected = false;
            resetUI();
        }

        function resetUI() {
            document.getElementById("connectBtn").innerText = "INITIALIZE LINK";
            document.getElementById("connectBtn").disabled = false;
            document.getElementById("micBtn").disabled = true;
            document.getElementById("statusText").innerText = "SYSTEM OFFLINE";
            document.getElementById("statusText").style.color = "#666";
            document.getElementById("connStatus").classList.remove("active");
        }

        // --- 2. AUDIO PLAYBACK ENGINE ---
        function playAudio(base64String) {
            const binaryString = atob(base64String);
            const len = binaryString.length;
            const bytes = new Int16Array(len / 2);
            for (let i = 0; i < len; i += 2) {
                bytes[i / 2] = (binaryString.charCodeAt(i) & 0xff) | ((binaryString.charCodeAt(i + 1) & 0xff) << 8);
            }

            const float32Data = new Float32Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) float32Data[i] = bytes[i] / 32768;

            const buffer = audioCtx.createBuffer(1, float32Data.length, 24000);
            buffer.getChannelData(0).set(float32Data);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            const playTime = Math.max(audioCtx.currentTime, nextStartTime);
            source.start(playTime);
            nextStartTime = playTime + buffer.duration;
        }

        // --- 3. MIC INPUT ---
        let mediaStream = null;
        let audioProcessor = null;

        async function startMic() {
            if (!isConnected) return;
            const btn = document.getElementById("micBtn");
            btn.classList.add("recording");
            btn.innerText = "LISTENING...";

            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });

            const inputCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const micSource = inputCtx.createMediaStreamSource(mediaStream);
            audioProcessor = inputCtx.createScriptProcessor(4096, 1, 1);

            micSource.connect(audioProcessor);
            audioProcessor.connect(inputCtx.destination);

            audioProcessor.onaudioprocess = (e) => {
                if (!isConnected) return;
                const inputData = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    let s = Math.max(-1, Math.min(1, inputData[i]));
                    pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));

                socket.send(JSON.stringify({
                    realtime_input: {
                        media_chunks: [{ mime_type: "audio/pcm", data: base64Audio }]
                    }
                }));
            };
        }

        function stopMic() {
            const btn = document.getElementById("micBtn");
            btn.classList.remove("recording");
            btn.innerText = "HOLD TO SPEAK";
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioProcessor) audioProcessor.disconnect();
        }

        // --- 4. VISUALIZER ---
        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            if (!analyser) return;

            analyser.getByteFrequencyData(dataArray);

            const canvas = document.getElementById("visualizer");
            const ctx = canvas.getContext("2d");
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = 80;

            ctx.clearRect(0, 0, width, height);

            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00f3ff";
            ctx.strokeStyle = "#00f3ff";
            ctx.lineWidth = 2;
            ctx.beginPath();

            for (let i = 0; i < dataArray.length; i++) {
                const angle = (i / dataArray.length) * Math.PI * 2;
                const amp = dataArray[i] / 2;
                const r = radius + amp;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();

            const avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
            ctx.fillStyle = `rgba(0, 243, 255, ${avg / 255})`;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.5 + (avg / 10), 0, Math.PI * 2);
            ctx.fill();
        }

        function log(msg) {
            const logDiv = document.getElementById("log");
            logDiv.innerHTML += `<div>${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>

</html>
